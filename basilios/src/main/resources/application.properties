spring.application.name=basilios
# ===========================================
# CONFIGURAÇÕES JWT (OBRIGATÓRIAS)
# ===========================================
jwt.secret=${JWT_SECRET:essa-bomba-nao-funciona-mas-agora-vai-funcionar-2025!}
jwt.expiration=${JWT_EXPIRATION:86400000}
spring.jpa.defer-datasource-initialization=true
# ===========================================
# CONFIGURAÇÕES DE SERVIDOR
# ===========================================
server.port=8080
server.error.include-binding-errors=always
server.error.include-message=always
server.error.include-stacktrace=on_param

# ===========================================
# CONFIGURAÇÕES DE BANCO DE DADOS
# ===========================================
spring.sql.init.mode= always
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/basiliosData?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=false}
spring.datasource.username=${DB_USERNAME:dev}
spring.datasource.password=${DB_PASSWORD:dev123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================================
# CONFIGURAÇÕES JPA/HIBERNATE
# ===========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===========================================
# CONFIGURAÇÕES DE ENCODING
# ===========================================
spring.datasource.sql-script-encoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ===========================================
# CONFIGURAÇÕES DA LOJA (para cálculo de distância)
# ===========================================
store.latitude=-23.550520
store.longitude=-46.633308
store.name=Basilios Hamburgueria
store.address=S Paulo, SP

# ===========================================
# CONFIGURAÇÕES DE LOGGING
# ===========================================
logging.level.com.basilios.basilios=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===========================================
# CONFIGURAÇÕES DE CORS (Development)
# ===========================================
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# ===========================================
# CONFIGURAÇÕES DE JACKSON (JSON)
# ===========================================
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.locale=pt_BR
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.serialization.write-dates-as-timestamps=false

# Diretório onde as imagens serão salvas (pode ser relativo à raiz do projeto)
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ===========================================
# CONFIGURAÇÕES DE PERFIL ATIVO
# ===========================================
spring.profiles.active=development
#=========================================
# CONFIGURAÇÕES DE E-MAIL (SMTP)
# ========================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

spring.mail.default-encoding=UTF-8
spring.mail.protocol=smtp

# ===========================================
# CONFIGURACOES DE RESET DE SENHA
# ===========================================
app.password-reset.ttl-minutes=60
app.password-reset.base-url=${PASSWORD_RESET_BASE_URL:http://localhost:5173/reset-password?token=}

# ===========================================
# CONFIGURAÇÕES DO RABBITMQ
# ===========================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
