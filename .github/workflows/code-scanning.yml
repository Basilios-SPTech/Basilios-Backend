name: SAST Security Scan (Snyk + Semgrep)

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main # escaneia PRs DESTINADOS à main
  workflow_dispatch: # trigger manual

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # ──────────────────────────────────────────────
  # Job 1 – Semgrep SARIF (sempre sucede)
  # ──────────────────────────────────────────────
  semgrep-sarif:
    name: SAST - Semgrep SARIF
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep (SARIF output)
        run: semgrep scan --sarif --output=semgrep.sarif
        env:
          SEMGREP_RULES: "p/security-audit p/owasp-top-ten p/secrets"

      - name: Upload Semgrep SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ──────────────────────────────────────────────
  # Job 2 – Semgrep CI gate + semgrep.dev push
  # ──────────────────────────────────────────────
  semgrep-ci:
    name: SAST - Semgrep CI Gate
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep CI
        run: semgrep ci
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ──────────────────────────────────────────────
  # Job 3 – Snyk Code (SAST) + Snyk Test (SCA)
  # ──────────────────────────────────────────────
  snyk:
    name: SAST + SCA - Snyk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: basilios # pom.xml está em /basilios

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: mvn -B package -DskipTests

      # ── SAST: análise de código-fonte ──
      - name: Snyk Code (SAST)
        uses: snyk/actions/maven@master
        with:
          command: code test
          args: --severity-threshold=low --sarif-file-output=snyk-sast.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Upload Snyk SAST SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: basilios/snyk-sast.sarif # path relativo à raiz do repo
          category: snyk-sast

      # ── SCA: análise de dependências (pom.xml) ──
      - name: Snyk Test (SCA)
        uses: snyk/actions/maven@master
        with:
          command: test
          args: --severity-threshold=low --sarif-file-output=snyk-sca.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Upload Snyk SCA SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: basilios/snyk-sca.sarif # path relativo à raiz do repo
          category: snyk-sca
